<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #E5D0BA; color: #1A1A1A; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 500px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #1A1A1A; background: #E5D0BA; font-family: 'Montserrat', sans-serif; }
        button { width: 100%; padding: 15px; background: #004D99; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        h1 { font-family: 'Allura', cursive; font-size: 2.5rem; }
        #video { width: 100%; background: #000; display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>Analyse Morphologique</h1>
        <input type="number" id="testeurId" placeholder="N° Testeur" inputmode="numeric">
        <input type="number" id="stature" placeholder="Stature (cm)" inputmode="numeric">
        <button onclick="startCam()">Démarrer la capture</button>
        <video id="video" playsinline autoplay></video>
    </div>

    <script>
        async function startCam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const v = document.getElementById('video');
            v.srcObject = stream;
            v.style.display = 'block';
        }
    </script>
</body>
</html>
