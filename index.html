<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atelier Audace - Calibration</title>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        :root { --sable: #E5D0BA; --noir: #1A1A1A; --indigo: #004D99; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--sable); 
            color: var(--noir); 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { font-family: 'Allura', cursive; font-size: 3.5rem; margin: 20px 0 5px; }
        p.subtitle { margin-bottom: 30px; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; }

        .container { width: 90%; max-width: 450px; text-align: center; }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border: 1px solid var(--indigo); 
            background: rgba(255,255,255,0.2);
            font-family: 'Montserrat', sans-serif;
        }

        .btn { 
            background: var(--indigo); color: white; border: none; 
            padding: 18px; width: 100%; cursor: pointer; 
            font-family: 'Montserrat', sans-serif; font-weight: bold;
            text-transform: uppercase; margin-top: 15px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }

        /* Zone de Calibration */
        #calibration-zone { 
            position: relative; width: 100%; margin-top: 20px;
            border: 3px solid var(--indigo); background: #000;
            display: none; touch-action: none; 
        }
        #photo-canvas { width: 100%; display: block; }

        .line { 
            position: absolute; left: 0; width: 100%; height: 3px; 
            background: var(--indigo); z-index: 10;
        }
        .line::before {
            content: ""; position: absolute; top: -15px; left: 50%; 
            transform: translateX(-50%); width: 40px; height: 30px;
            background: var(--indigo); border-radius: 5px;
        }
        .line::after {
            content: "↕"; position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%); color: white; font-weight: bold;
        }

        /* Galerie de fin */
        #gallery { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; margin: 20px 0; 
        }
        .thumb-box { font-size: 0.7rem; font-weight: bold; }
        .thumb-box img { width: 100%; border: 1px solid var(--indigo); background: white; }

        .hidden { display: none !important; }
        .step-info { background: var(--noir); color: white; padding: 10px; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="screen-1" class="container">
        <h1>Atelier Audace</h1>
        <p class="subtitle">Calibration Phase Test</p>
        <input type="text" id="client-id" placeholder="NUMÉRO TESTEUR">
        <input type="number" id="stature" placeholder="STATURE (CM)">
        <p id="view-label" style="font-weight: bold; margin-top: 20px;">Vue actuelle : FACE</p>
        <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden">
        <button class="btn" onclick="document.getElementById('file-input').click()">Prendre la photo</button>
    </div>

    <div id="screen-2" class="container hidden">
        <p>Glissez les lignes sur le <b>sommet du crâne</b> et les <b>talons</b>.</p>
        <div id="calibration-zone">
            <canvas id="photo-canvas"></canvas>
            <div id="line-head" class="line" style="top: 20%;"></div>
            <div id="line-feet" class="line" style="top: 80%;"></div>
        </div>
        <button class="btn" onclick="processAndSave()">Valider cette vue</button>
    </div>

    <div id="screen-3" class="container hidden">
        <h1>Validation</h1>
        <p>Vos 3 photos avec repères et floutage :</p>
        <div id="gallery"></div>
        <div class="step-info">Ces photos seront envoyées sur le Drive sécurisé.</div>
        <button class="btn" onclick="uploadToServer()">Confirmer l'envoi</button>
        <button class="btn" style="background:var(--noir)" onclick="location.reload()">Recommencer</button>
    </div>

    <script>
        const views = ['Face', 'Profil', 'Dos'];
        let currentIdx = 0;
        let originalImg = new Image();
        let finalImages = [];
        const scriptURL = 'VOTRE_URL_GOOGLE_APPS_SCRIPT_ICI'; // À remplacer après déploiement

        // Gérer la prise de photo
        document.getElementById('file-input').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (f) => {
                originalImg.onload = () => {
                    document.getElementById('screen-1').classList.add('hidden');
                    document.getElementById('screen-2').classList.remove('hidden');
                    initCalibration();
                };
                originalImg.src = f.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function initCalibration() {
            const canvas = document.getElementById('photo-canvas');
            const zone = document.getElementById('calibration-zone');
            zone.style.display = 'block';
            
            // Adapter le canvas à l'image
            canvas.width = originalImg.width;
            canvas.height = originalImg.height;
            canvas.getContext('2d').drawImage(originalImg, 0, 0);

            // Rendre les lignes tactiles
            setupDraggable(document.getElementById('line-head'));
            setupDraggable(document.getElementById('line-feet'));
        }

        function setupDraggable(el) {
            el.ontouchmove = (e) => {
                e.preventDefault();
                let rect = document.getElementById('calibration-zone').getBoundingClientRect();
                let y = (e.touches[0].clientY - rect.top) / rect.height * 100;
                if(y >= 0 && y <= 100) el.style.top = y + '%';
            };
        }

        function processAndSave() {
            const canvas = document.getElementById('photo-canvas');
            const ctx = canvas.getContext('2d');
            const headY = (parseFloat(document.getElementById('line-head').style.top) / 100) * canvas.height;
            const feetY = (parseFloat(document.getElementById('line-feet').style.top) / 100) * canvas.height;

            // 1. ANONYMAT : Floutage relatif à la ligne de tête
            ctx.save();
            ctx.filter = 'blur(50px)';
            // On floute un rectangle sous la ligne de tête (visage)
            const blurHeight = canvas.height * 0.15;
            ctx.drawImage(canvas, 0, headY + 10, canvas.width, blurHeight, 0, headY + 10, canvas.width, blurHeight);
            ctx.restore();

            // 2. MARQUAGE INDIGO (Repères pour l'expert)
            ctx.strokeStyle = "#004D99";
            ctx.lineWidth = canvas.width * 0.015;
            ctx.beginPath(); ctx.moveTo(0, headY); ctx.lineTo(canvas.width, headY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, feetY); ctx.lineTo(canvas.width, feetY); ctx.stroke();

            // Sauvegarde
            finalImages.push({
                view: views[currentIdx],
                data: canvas.toDataURL('image/jpeg', 0.6)
            });

            currentIdx++;
            if(currentIdx < 3) {
                document.getElementById('view-label').innerText = "Vue actuelle : " + views[currentIdx].toUpperCase();
                document.getElementById('screen-2').classList.add('hidden');
                document.getElementById('screen-1').classList.remove('hidden');
            } else {
                showGallery();
            }
        }

        function showGallery() {
            document.getElementById('screen-2').classList.add('hidden');
            document.getElementById('screen-3').classList.remove('hidden');
            const gal = document.getElementById('gallery');
            finalImages.forEach(imgObj => {
                const div = document.createElement('div');
                div.className = "thumb-box";
                div.innerHTML = `<span>${imgObj.view}</span><img src="${imgObj.data}">`;
                gal.appendChild(div);
            });
        }

        async function uploadToServer() {
            const id = document.getElementById('client-id').value;
            const stature = document.getElementById('stature').value;
            
            alert("Envoi en cours vers l'Atelier Audace...");
            
            const payload = {
                id_testeur: id,
                stature: stature,
                photoFace: finalImages[0].data,
                photoProfil: finalImages[1].data,
                photoDos: finalImages[2].data
            };

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', // Important pour Google Apps Script
                    body: JSON.stringify(payload)
                });
                alert("Données transmises avec succès ! Merci de votre contribution.");
                location.reload();
            } catch (e) {
                alert("Erreur de connexion. Vérifiez l'URL du script.");
            }
        }
    </script>
</body>
</html>
