<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audace - Collecte</title>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --sable: #E5D0BA; --noir: #1A1A1A; --indigo: #004D99; }
        body { background: var(--sable); color: var(--noir); font-family: 'Montserrat', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 90%; max-width: 450px; text-align: center; padding: 20px 0; }
        h1 { font-family: 'Allura', cursive; font-size: 3.5rem; margin: 10px 0; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid var(--indigo); background: rgba(255,255,255,0.4); font-size: 1rem; }
        .btn { background: var(--indigo); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; font-weight: 600; text-transform: uppercase; margin-top: 15px; }
        #calibration-zone { position: relative; width: 100%; border: 4px solid var(--indigo); background: #000; display: none; touch-action: none; }
        #photo-canvas { width: 100%; display: block; }
        .line { position: absolute; left: 0; width: 100%; height: 4px; background: var(--indigo); z-index: 10; }
        .line::after { content: "↔"; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); background: var(--indigo); color: white; padding: 2px 15px; border-radius: 20px; }
        #gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .thumb-box img { width: 100%; border: 2px solid var(--indigo); }
        .hidden { display: none !important; }
        .loader { color: var(--indigo); font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="screen-1" class="container">
        <h1>Atelier Audace</h1>
        <input type="text" id="client-id" placeholder="ID TESTEUR">
        <input type="number" id="stature" placeholder="STATURE (CM)">
        <p style="font-weight:600; color:var(--indigo); margin-top:20px;">VUE : <span id="current-view-name">FACE</span></p>
        <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden">
        <button class="btn" onclick="document.getElementById('file-input').click()">Prendre la photo</button>
    </div>

    <div id="screen-2" class="container hidden">
        <p>Ajustez les lignes (Sommet du crâne / Talons)</p>
        <div id="calibration-zone">
            <canvas id="photo-canvas"></canvas>
            <div id="line-head" class="line" style="top: 20%;"></div>
            <div id="line-feet" class="line" style="top: 80%;"></div>
        </div>
        <button class="btn" onclick="processAndSave()">Valider</button>
    </div>

    <div id="screen-3" class="container hidden">
        <h1>Validation</h1>
        <div id="gallery"></div>
        <div id="status" class="hidden loader">ENVOI EN COURS...</div>
        <button id="final-btn" class="btn" onclick="uploadToServer()">Confirmer l'envoi</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz_byaibLRE1GEDDGWeiAoQgFx0cSsEJ9IifZxuEIpGT2fwW7OARcEhMd3w7pDZz2IF/exec';
        const views = ['Face', 'Profil', 'Dos'];
        let currentIdx = 0;
        let originalImg = new Image();
        let finalImages = [];

        document.getElementById('file-input').onchange = (e) => {
            if(!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = (f) => {
                originalImg.onload = () => {
                    document.getElementById('screen-1').classList.add('hidden');
                    document.getElementById('screen-2').classList.remove('hidden');
                    const canvas = document.getElementById('photo-canvas');
                    document.getElementById('calibration-zone').style.display = 'block';
                    canvas.width = originalImg.width;
                    canvas.height = originalImg.height;
                    canvas.getContext('2d').drawImage(originalImg, 0, 0);
                    initDraggable(document.getElementById('line-head'));
                    initDraggable(document.getElementById('line-feet'));
                };
                originalImg.src = f.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function initDraggable(el) {
            el.ontouchmove = (e) => {
                e.preventDefault();
                let rect = document.getElementById('calibration-zone').getBoundingClientRect();
                let y = (e.touches[0].clientY - rect.top) / rect.height * 100;
                if(y >= 0 && y <= 100) el.style.top = y + '%';
            };
        }

        function processAndSave() {
            const canvas = document.getElementById('photo-canvas');
            const ctx = canvas.getContext('2d');
            const hY = (parseFloat(document.getElementById('line-head').style.top)/100)*canvas.height;
            const fY = (parseFloat(document.getElementById('line-feet').style.top)/100)*canvas.height;

            ctx.save();
            ctx.filter = 'blur(50px)';
            ctx.drawImage(canvas, 0, hY+5, canvas.width, canvas.height*0.15, 0, hY+5, canvas.width, canvas.height*0.15);
            ctx.restore();

            ctx.strokeStyle = "#004D99";
            ctx.lineWidth = canvas.width * 0.015;
            ctx.beginPath(); ctx.moveTo(0, hY); ctx.lineTo(canvas.width, hY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, fY); ctx.lineTo(canvas.width, fY); ctx.stroke();

            finalImages.push({ view: views[currentIdx], data: canvas.toDataURL('image/jpeg', 0.5) });
            currentIdx++;
            if(currentIdx < 3) {
                document.getElementById('current-view-name').innerText = views[currentIdx].toUpperCase();
                document.getElementById('screen-2').classList.add('hidden');
                document.getElementById('screen-1').classList.remove('hidden');
            } else {
                document.getElementById('screen-2').classList.add('hidden');
                document.getElementById('screen-3').classList.remove('hidden');
                finalImages.forEach(img => {
                    const div = document.createElement('div');
                    div.className = "thumb-box";
                    div.innerHTML = `<img src="${img.data}">`;
                    document.getElementById('gallery').appendChild(div);
                });
            }
        }

        function uploadToServer() {
            const id = document.getElementById('client-id').value;
            const stature = document.getElementById('stature').value;
            if(!id || !stature) return alert("Champs vides");
            
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('final-btn').disabled = true;

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    id_testeur: id,
                    stature: stature,
                    photoFace: finalImages[0].data,
                    photoProfil: finalImages[1].data,
                    photoDos: finalImages[2].data
                })
            }).then(() => {
                alert("Données envoyées !");
                location.reload();
            }).catch(() => {
                alert("Erreur");
                document.getElementById('final-btn').disabled = false;
            });
        }
    </script>
</body>
</html>
