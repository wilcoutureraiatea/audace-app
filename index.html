<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&family=Allura&display=swap" rel="stylesheet">
    <style>
        body { background-color: #E5D0BA; color: #1A1A1A; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; }
        h1, h2 { font-family: 'Allura', cursive; color: #1A1A1A; text-align: center; }
        .app-container { background: #FFFFFF; padding: 40px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #004D99; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>Analyse Morphologique</h1>
        <div id="step1">
            <input type="number" id="testeurId" placeholder="N° du testeur" inputmode="numeric">
            <input type="number" id="stature" placeholder="Stature (cm)" inputmode="numeric">
            <button onclick="document.getElementById('cameraInput').click()">DÉMARRER LA CAPTURE</button>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
        </div>
    </div>
</body>
</html>
