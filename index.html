<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atelier Audace - Calibration</title>
    <style>
        /* Charte Graphique : Anthracite et Sobriété */
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0; 
        }
        .app-container { 
            width: 100%; 
            max-width: 600px; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            color: #333; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
        .logo { width: 140px; display: block; margin: 0 auto 25px auto; }
        h1, h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        
        /* Champs de saisie : Cadre blanc épuré */
        input { 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: #fcfcfc;
        }
        
        /* Boutons : Structurels et nets */
        button { 
            width: 100%; 
            padding: 18px; 
            margin-top: 20px; 
            background: #1a1a1a; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Zone de capture */
        .capture-zone { position: relative; width: 100%; margin-top: 20px; border-radius: 8px; border: 2px solid #1a1a1a; background: #000; display: none; }
        #previewImg { width: 100%; display: block; }
        
        /* Carré noir de masquage */
        #blackSquare { position: absolute; width: 80px; height: 80px; background-color: black; border: 2px solid white; cursor: move; touch-action: none; top: 20px; left: 20px; z-index: 10; display: none; }
        
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .photo-grid img { width: 100%; border-radius: 8px; border: 2px solid #ccc; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <img src="ton-logo.png" class="logo" alt="Logo Atelier">
        
        <div id="step1">
            <h1>Analyse Morphologique</h1>
            <input type="number" id="testeurId" placeholder="N° du testeur" inputmode="numeric">
            <input type="number" id="stature" placeholder="Stature (cm)" inputmode="numeric">
            <button onclick="startCapture()">Démarrer la capture</button>
        </div>

        <div id="step2" class="hidden">
            <h2 id="captureLabel">Capture : Face</h2>
            <input type="file" id="cameraInput" accept="image/*" style="display:none">
            <button id="btnCapture" onclick="document.getElementById('cameraInput').click()">Ouvrir l'appareil photo</button>
            <div class="capture-zone" id="captureZone">
                <img id="previewImg" src="">
                <div id="blackSquare"></div>
            </div>
            <button id="btnNext" class="hidden" onclick="processAndNext()">Valider le masquage</button>
        </div>

        <div id="step3" class="hidden">
            <h2>Validation finale</h2>
            <div class="photo-grid" id="photoGrid"></div>
            <button onclick="sendData()">Envoyer au système</button>
        </div>
    </div>

    <script>
        let currentStep = 0;
        const steps = ['Face', 'Profil', 'Dos'];
        const finalPhotos = [];

        function startCapture() {
            if(!document.getElementById('testeurId').value || !document.getElementById('stature').value) return alert("Veuillez saisir les informations.");
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        // Gestion de la capture photo
        document.getElementById('cameraInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('previewImg').src = event.target.result;
                document.getElementById('captureZone').style.display = 'block';
                document.getElementById('blackSquare').style.display = 'block';
                document.getElementById('btnNext').classList.remove('hidden');
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // Traitement de l'image (Compression + Masquage)
        function processAndNext() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = document.getElementById('previewImg');
            
            canvas.width = 1200;
            canvas.height = (img.naturalHeight / img.naturalWidth) * 1200;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const sq = document.getElementById('blackSquare');
            const scaleX = canvas.width / img.offsetWidth;
            const scaleY = canvas.height / img.offsetHeight;
            ctx.fillStyle = 'black';
            ctx.fillRect(sq.offsetLeft * scaleX, sq.offsetTop * scaleY, sq.offsetWidth * scaleX, sq.offsetHeight * scaleY);
            
            finalPhotos.push(canvas.toDataURL('image/jpeg', 0.8));

            currentStep++;
            if(currentStep < 3) {
                document.getElementById('captureLabel').innerText = "Capture : " + steps[currentStep];
                document.getElementById('captureZone').style.display = 'none';
                document.getElementById('btnNext').classList.add('hidden');
            } else {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
                finalPhotos.forEach(p => {
                    const i = document.createElement('img'); i.src = p; document.getElementById('photoGrid').appendChild(i);
                });
            }
        }

        function sendData() {
            alert("Données envoyées au système avec succès.");
        }
        
        // Drag & Drop tactile pour le carré noir
        const sq = document.getElementById('blackSquare');
        let isDragging = false;
        sq.addEventListener('touchstart', (e) => { isDragging = true; });
        document.addEventListener('touchmove', (e) => {
            if(isDragging) {
                sq.style.left = (e.touches[0].clientX - 40) + 'px';
                sq.style.top = (e.touches[0].clientY - 40) + 'px';
            }
        });
        sq.addEventListener('touchend', () => { isDragging = false; });
    </script>
</body>
</html>
