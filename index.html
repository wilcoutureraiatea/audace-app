<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">
    <style>
      body { background-color: #E5D0BA; color: #1A1A1A; font-family: 'Montserrat', sans-serif; padding: 20px; text-align: center; }
      #logo-container { text-align: left; padding: 10px; }
      #logo-container img { width: 80px; height: auto; }
      h1 { font-family: 'Allura', cursive; color: #004D99; font-size: 3em; margin: 10px 0; }
      input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #1A1A1A; background: #FFF; }
      button { width: 90%; padding: 15px; background-color: #004D99; color: #FFF; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
      video { width: 100%; max-width: 300px; background: #000; display: block; margin: 10px auto; border: 2px solid #1A1A1A; }
    </style>
  </head>
  <body>
    
    <div id="logo-container">
      <img src="votre-logo.png" alt="Atelier Audace">
    </div>

    <h1>Atelier Audace</h1>
    
    <video id="video" autoplay playsinline></video>
    
    <button onclick="capture('photoFace')">Capturer Face</button>
    <button onclick="capture('photoProfil')">Capturer Profil</button>
    <button onclick="capture('photoDos')">Capturer Dos</button>
    
    <input type="text" id="testeurId" placeholder="N° Testeur">
    <input type="number" id="stature" placeholder="Stature (cm)">
    
    <button onclick="sendFinal()" style="background:#1A1A1A;">Enregistrer au Système</button>

    <script>
      const video = document.getElementById('video');
      let photos = { photoFace: "", photoProfil: "", photoDos: "" };

      // Activation caméra
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(stream => { video.srcObject = stream; });

      function capture(type) {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        
        // Floutage automatique de la zone visage
        ctx.filter = 'blur(20px)';
        ctx.fillRect(canvas.width/3, canvas.height/6, canvas.width/3, canvas.height/4);
        
        photos[type] = canvas.toDataURL('image/jpeg', 0.5);
        alert(type + ' capturée et anonymisée.');
      }

      async function sendFinal() {
        // REMPLACE CETTE LIGNE PAR L'URL DE TON SCRIPT APPS SCRIPT
        const url = "https://script.google.com/macros/s/AKfycbwPUkXIF-9x3j4om3ucHmzLBrPRo8JM5xvhFxS1GGAAEIGqpfRFt_ntTNpfLIMCAUVi/exec"; 
        
        await fetch(url, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({
            testeurId: document.getElementById('testeurId').value,
            stature: document.getElementById('stature').value,
            ...photos
          })
        });
        alert('Données enregistrées dans le système !');
      }
    </script>
  </body>
</html>
