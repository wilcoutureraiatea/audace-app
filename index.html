<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Audace - Calibration</title>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        body { background-color: #E5D0BA; color: #1A1A1A; font-family: 'Montserrat', sans-serif; margin: 0; text-align: center; }
        h1 { font-family: 'Allura', cursive; font-size: 3.5rem; margin: 10px 0; }
        #app-container { max-width: 500px; margin: auto; padding: 20px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        input, select { width: 100%; padding: 10px; border: 1px solid #004D99; background: rgba(255,255,255,0.5); }
        
        #camera-box { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border: 3px solid #004D99; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Rigueur Mathématique : Lignes de repère */
        .guide { position: absolute; width: 100%; height: 2px; background: #004D99; z-index: 100; box-shadow: 0 0 5px rgba(0,77,153,0.5); }
        #line-head { top: 15%; }
        #line-feet { bottom: 10%; }
        .label-guide { position: absolute; color: #004D99; font-size: 10px; font-weight: bold; right: 5px; }

        .btn { background: #004D99; color: white; border: none; padding: 15px 30px; cursor: pointer; font-family: 'Montserrat', sans-serif; width: 100%; margin-top: 10px; }
        .btn-secondary { background: #1A1A1A; margin-top: 5px; }
        #canvas-preview { display: none; width: 100%; }
    </style>
</head>
<body>
    <div id="app-container">
        <h1>Atelier Audace</h1>
        
        <div id="setup-step">
            <div class="input-group">
                <label>ID Testeur</label>
                <input type="text" id="id_testeur" placeholder="Ex: TEST001">
            </div>
            <div class="input-group">
                <label>Stature (cm)</label>
                <input type="number" id="stature" placeholder="Ex: 175">
            </div>
            <button class="btn" onclick="startCamera()">Démarrer la Calibration</button>
        </div>

        <div id="capture-step" style="display:none;">
            <h3 id="step-title">Vue de Face</h3>
            <div id="camera-box">
                <video id="video" autoplay playsinline></video>
                <div id="line-head" class="guide"><span class="label-guide">SOMMET CRÂNE</span></div>
                <div id="line-feet" class="guide"><span class="label-guide">BASE TALONS</span></div>
            </div>
            <button class="btn" onclick="takeSnapshot()">Prendre la photo</button>
        </div>

        <div id="preview-step" style="display:none;">
            <h3>Vérification Anonymat</h3>
            <canvas id="canvas-preview"></canvas>
            <button class="btn" onclick="confirmPhoto()">Valider & Suivant</button>
            <button class="btn btn-secondary" onclick="retake()">Recommencer</button>
        </div>
    </div>

    <script>
        let currentStep = 0;
        const steps = ['Face', 'Profil', 'Dos'];
        let photos = {};
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas-preview');

        async function startCamera() {
            if(!document.getElementById('id_testeur').value || !document.getElementById('stature').value) return alert("Veuillez remplir les infos.");
            document.getElementById('setup-step').style.display = 'none';
            document.getElementById('capture-step').style.display = 'block';
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            video.srcObject = stream;
        }

        function takeSnapshot() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            // IA FLOU ANONYMAT : Floutage de la zone haute (visage)
            ctx.filter = 'blur(20px)';
            ctx.fillRect(canvas.width*0.3, 0, canvas.width*0.4, canvas.height*0.25);
            ctx.filter = 'none';

            document.getElementById('capture-step').style.display = 'none';
            document.getElementById('preview-step').style.display = 'block';
            canvas.style.display = 'block';
        }

        function confirmPhoto() {
            photos[steps[currentStep]] = canvas.toDataURL('image/jpeg', 0.8);
            currentStep++;
            if(currentStep < 3) {
                document.getElementById('step-title').innerText = "Vue de " + steps[currentStep];
                retake();
            } else {
                sendData();
            }
        }

        function retake() {
            document.getElementById('preview-step').style.display = 'none';
            document.getElementById('capture-step').style.display = 'block';
        }

        async function sendData() {
            alert("Envoi des données à l'Atelier... Veuillez patienter.");
            const payload = {
                id_testeur: document.getElementById('id_testeur').value,
                stature: document.getElementById('stature').value,
                photoFace: photos.Face,
                photoProfil: photos.Profil,
                photoDos: photos.Dos,
                patron: "Audace_V1" // Modifiable
            };
            
            // Remplacez par votre URL de déploiement Google Apps Script
            const GAS_URL = "VOTRE_URL_SCRIPT_ICI";
            
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(data => alert("Calibration terminée avec succès !"));
        }
    </script>
</body>
</html>
