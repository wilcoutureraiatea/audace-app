<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Allura&display=swap" rel="stylesheet">
    <style>
      body { background-color: #E5D0BA; color: #1A1A1A; font-family: 'Montserrat', sans-serif; padding: 20px; text-align: center; }
      #logo { width: 80px; margin-bottom: 10px; }
      h1 { font-family: 'Allura', cursive; color: #004D99; font-size: 2.5em; margin: 0; }
      .step { background: #FFF; border: 1px solid #1A1A1A; padding: 15px; margin: 10px 0; border-radius: 8px; }
      .status-ok { background-color: #d4edda !important; border-color: #28a745 !important; }
      button { width: 100%; padding: 15px; background-color: #004D99; color: #FFF; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 5px; }
      #video { width: 100%; max-width: 300px; background: #000; display: block; margin: 10px auto; border-radius: 5px; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <img src="votre-logo.png" id="logo">
    <h1>Fiche Technique Morphologique</h1>
    
    <video id="video" autoplay playsinline></video>

    <div id="controls">
      <div class="step" id="step-face"><button onclick="capture('photoFace', 'step-face')">Capturer Face</button></div>
      <div class="step" id="step-profil"><button onclick="capture('photoProfil', 'step-profil')">Capturer Profil</button></div>
      <div class="step" id="step-dos"><button onclick="capture('photoDos', 'step-dos')">Capturer Dos</button></div>
    </div>

    <input type="text" id="testeurId" placeholder="N° Testeur">
    <input type="number" id="stature" placeholder="Stature (cm)">
    <button onclick="sendFinal()" style="background:#1A1A1A;">Enregistrer au Système</button>

    <script>
      const video = document.getElementById('video');
      let photos = { photoFace: "", photoProfil: "", photoDos: "" };
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(stream => { video.srcObject = stream; });

      function capture(type, id) {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        ctx.filter = 'blur(20px)';
        ctx.fillRect(canvas.width/3, canvas.height/6, canvas.width/3, canvas.height/4);
        photos[type] = canvas.toDataURL('image/jpeg', 0.5);
        document.getElementById(id).classList.add('status-ok');
        alert(type + ' capturée.');
      }

      async function sendFinal() {
        const url = "TON_URL_APPS_SCRIPT_ICI"; // <--- REMPLACE PAR TON URL
        await fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({
          testeurId: document.getElementById('testeurId').value,
          stature: document.getElementById('stature').value,
          ...photos
        })});
        alert('Commande enregistrée, par Wil, Créateur-Couturier.');
      }
    </script>
  </body>
</html>
