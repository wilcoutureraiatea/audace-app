<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Morphologique</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .logo { width: 100px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background-color: #000; color: #fff; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <img src="ton-logo.png" alt="Logo" class="logo">
    <h1>Analyse Morphologique</h1>
    
    <input type="text" id="testeurId" placeholder="N° du testeur">
    <input type="number" id="stature" placeholder="Stature (cm)">
    
    <button onclick="demarrerCapture()">Démarrer la capture</button>

    <script>
        function demarrerCapture() {
            const id = document.getElementById('testeurId').value;
            const stature = document.getElementById('stature').value;
            
            if(id && stature) {
                // Ici, nous passerons à la séquence de capture
                alert("Passage à la capture pour : " + id);
            } else {
                alert("Veuillez remplir tous les champs.");
            }
        }
    </script>
</body>
</html>
